services:
  redis:
    image: redis
    restart: unless-stopped
    ports:
      - "6390:6379"
    volumes:
      - ./redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5685:5672" # AMQP protocol port
      - "15685:15672" # HTTP management UI port
    environment:
      RABBITMQ_DEFAULT_USER: jayeen
      RABBITMQ_DEFAULT_PASS: jayeen6783
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq/

volumes:
  rabbitmq_data:
  redis-data:
